<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>learn-lab</title>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface-2: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #38bdf8;
    --accent-2: #a78bfa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 80px 24px 120px;
    gap: 48px;
  }
  h1 {
    font-size: 48px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-align: center;
    line-height: 1.2;
  }
  .sub {
    font-size: 18px;
    color: var(--muted);
    text-align: center;
    margin-top: -32px;
  }
  .lectures {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px;
    width: 100%;
    max-width: 960px;
  }
  .lecture {
    display: block;
    text-decoration: none;
    color: inherit;
    background: var(--surface);
    border: 1px solid var(--surface-2);
    border-radius: 14px;
    padding: 24px 26px;
    transition: transform 0.2s ease, border-color 0.2s ease;
  }
  .lecture:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
  }
  .lecture .tag {
    display: inline-block;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    background: rgba(56, 189, 248, 0.12);
    padding: 3px 10px;
    border-radius: 999px;
    margin-bottom: 12px;
  }
  .lecture h2 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .lecture p {
    font-size: 15px;
    color: var(--muted);
    line-height: 1.6;
  }
  footer {
    font-size: 13px;
    color: var(--muted);
  }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
  <h1>learn-lab</h1>
  <p class="sub">학습 덱 모음</p>

  <div class="lectures">
    <a class="lecture" href="1_langchain_langgraph_fast_track/">
      <span class="tag">Lecture 1</span>
      <h2>LangChain &amp; LangGraph 패스트트랙</h2>
      <p>Prompt · Model · Parser · Structured Output 부터 State 그래프, Interrupt, Checkpoint, Agent · Middleware 까지.</p>
    </a>
  </div>

  <footer>
    ← → / Space / Home / End 로 슬라이드 이동 · Source on
    <a href="https://github.com/enginerd-kr/learn-lab" target="_blank" rel="noreferrer">GitHub</a>
  </footer>
</body>
</html>
